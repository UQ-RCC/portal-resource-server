name: Build & Test

on: 
  push:
    tags:
      - '*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --force --tags

      - uses: actions/cache@v4
        with:
          path: |
            .citemp/caches
            .citemp/wrapper
          key: gradle-cache

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - run: sudo apt-get -y install debhelper make fakeroot

      - name: Build
        run: |
          export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          ./gradlew --quiet -g .citemp --no-daemon clean distTar

      - run: make -f Makefile.deb all

      - name: Stage distribution files
        run: |
          mkdir -p dist
          echo "=== build/distributions contents ==="
          ls -la build/distributions/
          cp portal-resource-server_*_all.deb dist/
          cp build/distributions/*.tar.gz dist/    # use plain wildcard

            - uses: actions/upload-artifact@v4
              with:
                name: release-artifacts
                path: dist/*

  deploy:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      #- name: Sign packages
       # run: |
         # sudo apt-get update  
         # sudo apt-get -y install debsigs gpg
         # printf '%s' "$RCC_PACKAGE_SIGNING_KEY" | gpg --import --batch
          # Use debsigs instead of dpkg-sig
         # for deb in dist/*.deb; do
          #  debsigs --sign=origin -k $RCC_PACKAGE_SIGNING_KEY_ID "$deb"
          #done
          # Generate checksums for all files
          #for i in dist/*; do
          #  sha256sum "$i" > "$i.sha256"
         # done
       # env:
         # RCC_PACKAGE_SIGNING_KEY: ${{ secrets.RCC_PACKAGE_SIGNING_KEY }}
        #  RCC_PACKAGE_SIGNING_KEY_ID: ${{ secrets.RCC_PACKAGE_SIGNING_KEY_ID }}

      - name: Generate checksums      # skip signing - key is expired
        run: |
          for i in dist/*; do
            sha256sum "$i" > "$i.sha256"
          done


      - uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/*

  docker:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --force --tags

      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Get version from tag
        id: version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "Building version: ${GITHUB_REF#refs/tags/}"

      - name: Rename tar.gz to tgz and copy to docker context
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/
          TARFILE=$(ls dist/*.tar.gz | head -1)
          echo "Found tarfile: $TARFILE"
          echo "=== Archive contents (first 5 lines) ==="
          tar tzf "$TARFILE" | head -5
          cp "$TARFILE" docker/prs-${{ steps.version.outputs.VERSION }}.tgz
          ls -la docker/

      - name: Log in to Harbor registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | \
          docker login registry.rc.nectar.org.au \
            -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VERSION=${{ steps.version.outputs.VERSION }} \
            -f docker/Dockerfile \
            -t registry.rc.nectar.org.au/rcc-portals-a/apps-ipp-prs:${{ steps.version.outputs.VERSION }} \
            docker/

      - name: Push Docker image
        run: |
          docker push \
            registry.rc.nectar.org.au/rcc-portals-a/apps-ipp-prs:${{ steps.version.outputs.VERSION }}