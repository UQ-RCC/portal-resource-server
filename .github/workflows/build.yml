name: Build & Test

on:
  push:
    tags:
      - '*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --force --tags

      - uses: actions/cache@v4
        with:
          path: |
            .citemp/caches
            .citemp/wrapper
          key: gradle-cache

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - run: sudo apt-get update && sudo apt-get -y install debhelper make fakeroot

      - name: Build
        run: |
          export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          VERSION=${GITHUB_REF#refs/tags/}
          echo "Building version: $VERSION"
          ./gradlew --quiet -g .citemp --no-daemon clean distTar \
            -Pversion=$VERSION

      - run: make -f Makefile.deb all

      - name: Stage distribution files
        run: |
          mkdir -p dist

          echo "=== build/distributions ==="
          ls -la build/distributions/

          echo "=== workspace root ==="
          ls -la

          # Copy deb - try multiple locations, don't fail
          cp *.deb dist/ 2>/dev/null || \
          cp portal-resource-server*.deb dist/ 2>/dev/null || \
          echo "Warning: No deb file found, skipping"

          # Copy only the correctly versioned tar.gz, skip null
          VERSION=${GITHUB_REF#refs/tags/}
          if [ -f "build/distributions/portal-resource-server-${VERSION}.tar.gz" ]; then
            cp build/distributions/portal-resource-server-${VERSION}.tar.gz dist/
            echo "Copied portal-resource-server-${VERSION}.tar.gz"
          else
            echo "ERROR: Expected file not found"
            ls build/distributions/
            exit 1
          fi

          echo "=== dist contents ==="
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*

  deploy:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      #- name: Sign packages
       # run: |
         # sudo apt-get update  
         # sudo apt-get -y install debsigs gpg
         # printf '%s' "$RCC_PACKAGE_SIGNING_KEY" | gpg --import --batch
          # Use debsigs instead of dpkg-sig
         # for deb in dist/*.deb; do
          #  debsigs --sign=origin -k $RCC_PACKAGE_SIGNING_KEY_ID "$deb"
          #done
          # Generate checksums for all files
          #for i in dist/*; do
          #  sha256sum "$i" > "$i.sha256"
         # done
       # env:
         # RCC_PACKAGE_SIGNING_KEY: ${{ secrets.RCC_PACKAGE_SIGNING_KEY }}
        #  RCC_PACKAGE_SIGNING_KEY_ID: ${{ secrets.RCC_PACKAGE_SIGNING_KEY_ID }}


      - name: Generate checksums
        run: |
          echo "=== dist contents ==="
          ls -la dist/
          for i in dist/*; do
            sha256sum "$i" > "$i.sha256"
          done

      - uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/*

  docker:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --force --tags

      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Get version from tag
        id: version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "Building version: ${GITHUB_REF#refs/tags/}"

      - name: Rename tar.gz to tgz and copy to docker context
        run: |
          echo "=== Files in dist/ ==="
          ls -la dist/

          # Use versioned file directly
          VERSION=${{ steps.version.outputs.VERSION }}
          TARFILE="dist/portal-resource-server-${VERSION}.tar.gz"

          if [ -f "$TARFILE" ]; then
            echo "Found: $TARFILE"
            echo "=== Archive contents (first 5 lines) ==="
            tar tzf "$TARFILE" | head -5
            cp "$TARFILE" docker/prs-${VERSION}.tgz
            echo "=== Files in docker/ ==="
            ls -la docker/
          else
            echo "ERROR: $TARFILE not found"
            ls -la dist/
            exit 1
          fi

      - name: Log in to Harbor registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | \
          docker login registry.rc.nectar.org.au \
            -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VERSION=${{ steps.version.outputs.VERSION }} \
            -f docker/Dockerfile \
            -t registry.rc.nectar.org.au/rcc-portals-a/apps-ipp-prs:${{ steps.version.outputs.VERSION }} \
            docker/

      - name: Push Docker image
        run: |
          docker push \
            registry.rc.nectar.org.au/rcc-portals-a/apps-ipp-prs:${{ steps.version.outputs.VERSION }}